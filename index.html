<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXPENSE-TRACKER</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <button data-view="dashboard">Dashboard</button>
        <button data-view="add">Add Transaction</button>
        <button data-view="history">History</button>
        <button data-view="reports">Reports</button>
    </nav>

    <div id="dashboard-view" class="view">
        <h2>Dashboard</h2>
    </div>

    <div id="add-view" class="view hidden">
        <h2>Add Transaction</h2>
        <form id="transaction-form">
            
            <label for="type">Type:</label>
            <select id ="type" name="type">
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>

            <label for="amount" >Amount:</label>
            <input type="number" id="amount" name="amount" placeholder="Amount" step="0.01" required>

            <label for="category">Category:</label>
            <select id="category" name="category">
                <option value="salary">Salary</option>
                <option value="food">Food</option>
                <option value="transportation">Transportation</option>
                <option value="entertainment">Entertainment</option>
                <option value="utilities">Utilities</option>
                <option value="healthcare">Healthcare</option>
                <option value="education">Education</option>
                <option value="shopping">Shopping</option>
                <option value="travel">Travel</option>
                <option value="other">Other</option>
            </select>

            <label for="date">Date:</label>
            <input type="date" id="date" name="date" required>

            <label for="description">Description:</label>
            <textarea id="description" name="description" placeholder="Description"></textarea>
            

            <button type="submit">Add Transaction</button>
            </form>
    </div>

    <div id="history-view" class="view hidden">
        <h2>History</h2>
    </div>

    <div id="reports-view" class="view hidden">
        <h2>Reports</h2>
    </div>

    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/transactions.js"></script>
    <script src="js/currency.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/views.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
